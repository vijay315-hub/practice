<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Details</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f4f6f8;
}

.container{
    max-width:800px;
    margin:20px auto;
    padding:20px;
    background:white;
    border-radius:10px;
}

.home-btn{
    display:inline-block;
    margin-bottom:15px;
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:8px 12px;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

  <a href="index.html" class="home-btn">← Back to Home</a>

  <div id="jobDetail">Loading job details...</div>

</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQE0orW_Uem5Vi736r-rSdwHKpJLmCmHh9IhVjIs2au5nnhMjhWv8Pp1X-yKHRlo-LhHuzHc9dgHPSH/pub?output=csv";

fetch(sheetURL)
.then(response => response.text())
.then(data => {

    let rows = data.split("\n").slice(1);
    let html = "";

    rows.forEach(row => {
        let cols = row.split(",");

        html += `
        <div class="card">
            <h3>${cols[0]}</h3>
            <p>${cols[1]}</p>
            <small>${cols[3]}</small><br>

            <a class="btn" href="${cols[2]}" target="_blank">Apply</a>
            <a class="btn" href="${cols[4]}" target="_blank">PDF</a>
        </div>
        `;
    });

    document.getElementById("jobs").innerHTML = html;

})
.catch(error => {
    document.getElementById("jobs").innerHTML = "Error loading jobs";
    console.error(error);
});
</script>
</body>
</html>
