<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Details</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f4f6f8;
}

.container{
    max-width:800px;
    margin:20px auto;
    padding:20px;
    background:white;
    border-radius:10px;
}

.home-btn{
    display:inline-block;
    margin-bottom:15px;
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:8px 12px;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

  <a href="index.html" class="home-btn">← Back to Home</a>

  <div id="jobDetail">Loading job details...</div>

</div>

<script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQE0orW_Uem5Vi736r-rSdwHKpJLmCmHh9IhVjIs2au5nnhMjhWv8Pp1X-yKHRlo-LhHuzHc9dgHPSH/pub?output=csv";
fetch(sheetURL)
.then(res => res.text())
.then(data => {

    let rows = data.split("\n").slice(1);
    let html = "";

    rows.forEach((row, index) => {

        let cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

        let title = cols[0] || "No Title";
        let desc = cols[1] || "";
        let link = cols[2] || "#";
        let date = cols[3] || "";
        let pdf  = cols[4] || "#";

        html += `
        <div class="card">
            <h3>${title}</h3>
            <p>${desc}</p>
            <small>${date}</small><br>

            <a class="btn" href="job-detail.html?id=${index}">View Details</a>
        </div>
        `;
    });

    document.getElementById("jobs").innerHTML = html;

})
.catch(err => {
    document.getElementById("jobs").innerHTML = "Error loading jobs";
    console.log(err);
});
</script>
</body>
</html>
