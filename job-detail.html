<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Details</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#0f172a;   /* dark background */
    color:#e5e7eb;
}

/* HEADER */
header{
    background:#111827;
    color:white;
    padding:20px;
    text-align:center;
}

/* CONTAINER */
.container{
    width:90%;
    max-width:850px;
    margin:20px auto;
}

/* CARD */
.card{
    background:#1f2937;   /* dark card */
    padding:18px;
    margin:12px 0;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.4);
}

/* TEXT */
.card h3{
    color:#f9fafb;
}

.card p{
    color:#d1d5db;
}

small{
    color:#9ca3af;
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:8px;
    padding:7px 12px;
    background:#2563eb;
    color:white;
    border-radius:8px;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    background:#1e3a8a;
}

/* BACK BUTTON */
.back-btn{
    display:inline-block;
    margin:10px;
    background:#2563eb;
    color:white;
    padding:8px 12px;
    border-radius:6px;
    text-decoration:none;
}

.back-btn:hover{
    background:#1e3a8a;
}
</style>
</head>

<body>

<div class="container">

  <a class="back-btn" href="index.html">⬅ Back to Home</a>

  <div id="jobDetail">Loading job details...</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQE0orW_Uem5Vi736r-rSdwHKpJLmCmHh9IhVjIs2au5nnhMjhWv8Pp1X-yKHRlo-LhHuzHc9dgHPSH/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    let rows = data.split("\n").slice(1);

    if(!rows[id]){
        document.getElementById("jobDetail").innerHTML = "Job not found ❌";
        return;
    }

    let cols = rows[id].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    let title = cols[0] || "No Title";
    let desc = cols[1] || "";
    let link = cols[2] || "#";
    let date = cols[3] || "";
    let pdf  = cols[4] || "#";

    document.getElementById("jobDetail").innerHTML = `
        <h2>${title}</h2>
        <p>${desc}</p>
        <p><b>Date:</b> ${date}</p>

        <a class="home-btn" href="${link}" target="_blank">Apply Now</a>
        <a class="home-btn" href="${pdf}" target="_blank">View PDF</a>
    `;

})
.catch(err => {
    document.getElementById("jobDetail").innerHTML = "Error loading job ❌";
    console.log(err);
});

</script>
</body>
</html>
